<script>
    /**
     * [安全性提示]
     * 核心 Webhook URL 已移至 GAS 後端的 Script Properties，
     * 確保 GitHub 公開儲存庫不會洩漏 Discord 頻道控制權。
     */
    const CONFIG = {
        GAS_API: "https://script.google.com/macros/s/AKfycbyGTYv98DOd9mxMm72pDQF08Eism1jyVOd2k4DK_onA1WZtqEn2wZEGJF9bUTjoWQHx/exec"
    };

    let menuStore = [], extraStore = [], vvipList = [], currentBasePrice = 0;

    window.onload = () => {
        // 使用 CONFIG.GAS_API 取代原本寫死的 URL
        fetch(CONFIG.GAS_API).then(res => res.json()).then(data => {
            document.getElementById('loading').style.display = 'none';
            if (data.status !== "開啟") {
                document.getElementById('closedSection').style.display = 'block';
                return;
            }
            document.getElementById('formSection').style.display = 'block';
            document.getElementById('resTitle').innerText = "今日店家：" + (data.restaurant || "點餐系統");
            
            menuStore = data.menu; extraStore = data.extras; vvipList = data.vvip;
            const menuSel = document.getElementById('menuSelect');
            menuSel.add(new Option("-- 請選擇飲品 --", ""));
            data.menu.forEach(row => { if(row[0]) menuSel.add(new Option(`${row[0]} ($${row[1]})`, row[0])); });
            
            const extraSel = document.getElementById('extraSelect');
            data.extras.forEach(row => { 
                let opt = new Option(`${row[0]} (+$${row[1]})`, row[0]); 
                opt.dataset.price = row[1]; 
                extraSel.add(opt); 
            });
        }).catch(err => {
            document.getElementById('loading').innerHTML = '<p class="text-danger">命運之雷連線失敗，請檢查天候(網路)。</p>';
        });
    };

    // ... 中間的 VVIP 邏輯、Random 閃電邏輯保持不變，唯 fetch 處改用 CONFIG.GAS_API ...

    document.getElementById('orderForm').onsubmit = function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true; btn.innerText = "雷鳴傳送中...";
        
        const payload = {
            userName: document.getElementById('userName').value,
            item: document.getElementById('menuSelect').value, 
            ice: document.getElementById('iceSelect').value,
            sugar: document.getElementById('sugarSelect').value, 
            extraItem: document.getElementById('extraSelect').value,
            price: currentBasePrice, 
            extraPrice: document.getElementById('extraSelect').selectedOptions[0] ? parseFloat(document.getElementById('extraSelect').selectedOptions[0].dataset.price) : 0,
            quantity: document.getElementById('qtyInput').value, 
            note: document.getElementById('note').value,
            hasPaid: document.getElementById('paidCheck').checked, 
            receivedAmount: document.getElementById('receivedAmt').value
        };

        fetch(CONFIG.GAS_API, { method: 'POST', body: JSON.stringify(payload) })
        .then(res => res.json()).then(res => {
            alert(res.result);
            this.reset(); btn.disabled = false; btn.innerText = "確認送出訂單";
            // ... 重設 UI 狀態 ...
        }).catch(() => {
            alert("傳送失敗，可能是雷陣雨干擾。");
            btn.disabled = false;
        });
    };

    document.getElementById('deleteBtn').onclick = function() {
        const name = document.getElementById('userName').value.trim();
        if (!name) return alert("請輸入姓名");
        if (!confirm("確定撤回？這將會驚動天聽！")) return;
        fetch(CONFIG.GAS_API, { method: 'POST', body: JSON.stringify({ action: "delete", userName: name }) })
        .then(res => res.json()).then(res => alert(res.result));
    };
</script>
