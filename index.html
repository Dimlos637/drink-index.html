<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我喝故我在? 造型飲料點餐系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --main-blue: #005a9c; --bg-color: #f0f4f8; --vvip-gold: #ffd700; --vvip-pink: #d63384; }
        body { background-color: var(--bg-color); padding: 15px; font-family: "Microsoft JhengHei", sans-serif; font-size: 16px; overflow-x: hidden; }
        .order-card { background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 25px; max-width: 500px; margin: auto; border-top: 10px solid var(--main-blue); position: relative; z-index: 10; transition: all 0.5s ease; }
        .closed-badge { background-color: #f8f9fa; border: 1px dashed var(--main-blue); color: #444; padding: 25px; border-radius: 15px; margin-top: 20px; }
        @keyframes goldGlow { 0% { border-top-color: var(--main-blue); } 50% { border-top-color: var(--vvip-gold); box-shadow: 0 0 25px var(--vvip-gold); border-top-width: 20px; } 100% { border-top-color: var(--main-blue); } }
        .vvip-active { animation: goldGlow 2s infinite ease-in-out; }
        .vvip-text { color: var(--vvip-pink); font-weight: 900; animation: heartBeat 1.5s infinite; display: inline-block; }
        @keyframes heartBeat { 0% {transform: scale(1);} 50% {transform: scale(1.05);} 100% {transform: scale(1);} }
        #flash-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: white; visibility: hidden; pointer-events: none; z-index: 9999; }
        .lightning-effect { visibility: visible !important; animation: lightning-strike 0.4s ease-out forwards; }
        @keyframes lightning-strike { 0% { opacity: 0; } 10% { opacity: 0.8; background-color: #fffce0; } 20% { opacity: 0.1; } 30% { opacity: 0.9; background-color: white; } 100% { opacity: 0; visibility: hidden; } }
        .btn-random { background-color: #e7f1ff !important; border: 1.5px dashed var(--main-blue) !important; color: var(--main-blue) !important; width: 100%; border-radius: 12px; font-weight: bold; padding: 10px; margin-top: 10px; transition: 0.2s; }
        .btn-submit { background-color: var(--main-blue) !important; color: white !important; width: 100%; border-radius: 30px; padding: 12px; font-weight: bold; border: none !important; margin-top: 25px; }
        .btn-cancel { background-color: transparent; color: #666; width: 100%; border-radius: 30px; padding: 8px; font-size: 0.9rem; border: 1px solid #ccc; margin-top: 12px; }
        .price-tag { color: var(--main-blue); font-weight: 900; font-size: 1.5rem; }
        .promo-badge { background-color: #fff9db; border: 1px dashed #fab005; padding: 10px; border-radius: 10px; font-size: 0.85rem; color: #856404; margin-bottom: 20px; text-align: center; }
        .form-label { font-weight: bold; color: #444; margin-top: 10px; display: block; }
    </style>
</head>
<body>
<div id="flash-overlay"></div>
<div class="container">
    <div id="loading" class="text-center py-5">
        <div class="spinner-border text-primary"></div>
        <p class="mt-2 text-secondary">正在連結命運之雷伺服器...</p>
    </div>
    <div id="formSection" class="order-card" style="display:none;">
        <h3 class="text-center mb-1" id="resTitle" style="color: var(--main-blue); font-weight: 900;">今日店家</h3>
        <p class="text-center text-secondary small mb-3">造型飲料點餐系統</p>
        <div class="promo-badge"><strong>🥤 50嵐限定：</strong> 單價超過 <strong>$35</strong>，加料 <strong>$0 免費</strong>！</div>
        <form id="orderForm">
            <div class="mb-3"><label class="form-label">您的姓名</label><input type="text" id="userName" class="form-control" placeholder="請輸入姓名" required></div>
            <div class="mb-4"><label class="form-label">選擇飲品</label><select id="menuSelect" class="form-select" required></select><button class="btn btn-random" type="button" id="randomBtn">🎲 今天想被雷 (命運選單)</button></div>
            <div class="row g-2">
                <div class="col-6"><label class="form-label">冰塊</label><select id="iceSelect" class="form-select" required>
                    <option value="正常冰">正常冰</option><option value="少冰">少冰</option><option value="微冰">微冰</option><option value="去冰">去冰</option><option value="完全去冰">完全去冰</option><option value="常溫">常溫</option><option value="熱">熱</option>
                </select></div>
                <div class="col-6"><label class="form-label">甜度</label><select id="sugarSelect" class="form-select" required>
                    <option value="正常甜">正常甜</option><option value="少糖(7分)">少糖(7分)</option><option value="半糖(5分)">半糖(5分)</option><option value="微糖(3分)">微糖(3分)</option><option value="一分糖">一分糖</option><option value="無糖">無糖</option>
                </select></div>
            </div>
            <div class="mb-3 mt-3"><label class="form-label">加點配料</label><select id="extraSelect" class="form-select"></select></div>
            <div class="mb-3"><label class="form-label">數量</label><input type="number" id="qtyInput" class="form-control" value="1" min="1" required><div id="priceDisplay" class="mt-2 text-end"></div></div>
            <div class="mb-3"><label class="form-label">備註</label><input type="text" id="note" class="form-control" placeholder="備註..."></div>
            <div class="mb-3 form-check"><input type="checkbox" class="form-check-input" id="paidCheck"><label class="form-check-label fw-bold" for="paidCheck" id="paidLabel" style="color: var(--main-blue);"> 我已現場繳費 </label></div>
            <div id="paymentSection" style="display:none;"><label class="form-label small">收取金額</label><input type="number" id="receivedAmt" class="form-control mb-2" placeholder="面額"><div class="fw-bold text-end">找零：<span id="changeAmt" class="text-danger">$0</span></div></div>
            <button type="submit" id="submitBtn" class="btn btn-submit">確認送出訂單</button>
            <button type="button" id="deleteBtn" class="btn btn-cancel">🔙 撤回我的最後一筆訂單</button>
        </form>
    </div>
    <div id="closedSection" class="order-card text-center py-5" style="display:none;">
        <h2 style="color: var(--main-blue); font-weight: bold; font-size: 1.5rem;">☁️ 烏雲散去，雷鳴暫歇</h2>
        <div class="closed-badge"><p class="mb-2 fw-bold">今日的命運之雷已盡數落下，天道已回歸寧靜。</p><hr><p class="mb-0 small text-secondary">欲求天啟（點餐）請待吉日。🥤</p></div>
    </div>
</div>

<script>
    const CONFIG = {
        GAS_API: "https://script.google.com/macros/s/AKfycbyGTYv98DOd9mxMm72pDQF08Eism1jyVOd2k4DK_onA1WZtqEn2wZEGJF9bUTjoWQHx/exec"
    };

    let menuStore = [], extraStore = [], vvipList = [], currentBasePrice = 0;

    window.onload = () => {
        fetch(CONFIG.GAS_API).then(res => res.json()).then(data => {
            document.getElementById('loading').style.display = 'none';
            if (data.status !== "開啟") { document.getElementById('closedSection').style.display = 'block'; return; }
            document.getElementById('formSection').style.display = 'block';
            document.getElementById('resTitle').innerText = "今日店家：" + (data.restaurant || "點餐系統");
            menuStore = data.menu; extraStore = data.extras; vvipList = data.vvip;
            const menuSel = document.getElementById('menuSelect');
            menuSel.add(new Option("-- 請選擇飲品 --", ""));
            data.menu.forEach(row => { if(row[0]) menuSel.add(new Option(`${row[0]} ($${row[1]})`, row[0])); });
            const extraSel = document.getElementById('extraSelect');
            data.extras.forEach(row => { let opt = new Option(`${row[0]} (+$${row[1]})`, row[0]); opt.dataset.price = row[1]; extraSel.add(opt); });
        }).catch(() => { document.getElementById('loading').innerHTML = '<p class="text-danger">連線失敗。</p>'; });
    };

    function updateUI() {
        const selectedItem = menuStore.find(r => r[0] === document.getElementById('menuSelect').value);
        currentBasePrice = selectedItem ? selectedItem[1] : 0;
        let qty = parseInt(document.getElementById('qtyInput').value) || 1;
        let extraOpt = document.getElementById('extraSelect').selectedOptions[0];
        let extraPrice = extraOpt ? parseFloat(extraOpt.dataset.price) : 0;
        let total = (currentBasePrice + (currentBasePrice > 35 ? 0 : extraPrice)) * qty;
        document.getElementById('priceDisplay').innerHTML = currentBasePrice > 0 ? `總計 <span class="price-tag">$${total}</span>` : "";
        let received = parseFloat(document.getElementById('receivedAmt').value) || 0;
        document.getElementById('changeAmt').innerText = `$${received - total}`;
        if (!document.getElementById('paidCheck').disabled) {
            document.getElementById('paymentSection').style.display = document.getElementById('paidCheck').checked ? 'block' : 'none';
        }
    }

    document.getElementById('userName').addEventListener('input', function() {
        const isVVIP = vvipList.includes(this.value.trim());
        const card = document.getElementById('formSection');
        const check = document.getElementById('paidCheck');
        const label = document.getElementById('paidLabel');
        if (isVVIP) {
            label.innerHTML = "✨ <span class='vvip-text'>恭喜解鎖『白嫖模式』</span>";
            check.checked = true; check.disabled = true; card.classList.add('vvip-active');
            document.getElementById('paymentSection').style.display = 'none';
        } else {
            label.innerHTML = "我已現場繳費"; check.disabled = false; card.classList.remove('vvip-active');
            updateUI();
        }
    });

    document.getElementById('randomBtn').onclick = function() {
        if (menuStore.length === 0) return;
        const overlay = document.getElementById('flash-overlay');
        overlay.classList.add('lightning-effect');
        setTimeout(() => overlay.classList.remove('lightning-effect'), 400);
        document.getElementById('menuSelect').selectedIndex = Math.floor(Math.random() * menuStore.length) + 1;
        document.getElementById('iceSelect').selectedIndex = Math.floor(Math.random() * 7);
        document.getElementById('sugarSelect').selectedIndex = Math.floor(Math.random() * 6);
        updateUI();
    };

    document.getElementById('menuSelect').onchange = updateUI;
    document.getElementById('extraSelect').onchange = updateUI;
    document.getElementById('qtyInput').oninput = updateUI;
    document.getElementById('receivedAmt').oninput = updateUI;
    document.getElementById('paidCheck').onchange = updateUI;

    document.getElementById('orderForm').onsubmit = function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true; btn.innerText = "傳送中...";
        fetch(CONFIG.GAS_API, {
            method: 'POST',
            body: JSON.stringify({
                userName: document.getElementById('userName').value,
                item: document.getElementById('menuSelect').value, ice: document.getElementById('iceSelect').value,
                sugar: document.getElementById('sugarSelect').value, extraItem: document.getElementById('extraSelect').value,
                price: currentBasePrice, extraPrice: document.getElementById('extraSelect').selectedOptions[0] ? parseFloat(document.getElementById('extraSelect').selectedOptions[0].dataset.price) : 0,
                quantity: document.getElementById('qtyInput').value, note: document.getElementById('note').value,
                hasPaid: document.getElementById('paidCheck').checked, receivedAmount: document.getElementById('receivedAmt').value
            })
        }).then(res => res.json()).then(res => {
            alert(res.result); this.reset(); btn.disabled = false; btn.innerText = "確認送出訂單"; updateUI();
        });
    };

    document.getElementById('deleteBtn').onclick = function() {
        const name = document.getElementById('userName').value.trim();
        if (!name || !confirm("確定撤回？")) return;
        fetch(CONFIG.GAS_API, { method: 'POST', body: JSON.stringify({ action: "delete", userName: name }) })
        .then(res => res.json()).then(res => alert(res.result));
    };
</script>
</body>
</html>
